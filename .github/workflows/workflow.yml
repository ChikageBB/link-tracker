name: CI
on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build (skip test)
        run: ./mvnw --batch-mode --no-transfer-progress --errors --fail-at-end -T 1C package -DskipTests=true -Djacoco.skip=true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/target/classes/
            **/target/generated-sources/

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Restore Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run linters
        run: ./mvnw --batch-mode --no-transfer-progress --errors --fail-at-end -T 1C \
          -pl '!build-report-aggregate' \
          spotless:check modernizer:modernizer spotbugs:check pmd:check pmd:cpd-check


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Skip tests (same as GitLab)
        run: |
          echo "Tests are skipped in CI due to runner timeout limits."
          ./mvnw --batch-mode --no-transfer-progress --errors --fail-at-end -T 1C \
            -pl '!ai-agent,!build-report-aggregate' \
            -DskipTests=true -Dmaven.test.skip=true package